name: Integration

on:
  schedule:
    # Nightly at 02:17 UTC — offset from :00 to reduce fleet contention
    - cron: '17 2 * * *'
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      canton_version:
        description: 'Canton/Splice Docker image version (e.g., 0.5.3)'
        required: false
        default: '0.5.3'

env:
  JAVA_OPTS: -Xmx2g
  CANTON_VERSION: ${{ github.event.inputs.canton_version || '0.5.3' }}

permissions:
  id-token: write       # Sigstore keyless signing via GitHub OIDC
  contents: read
  attestations: write   # Store attestations in GitHub's attestation API

jobs:
  conformance:
    name: Live Network Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build conformance kit
        run: make assembly

      - name: Override Canton version (if specified)
        if: github.event.inputs.canton_version
        run: sed -i "s/^CANTON_VERSION=.*/CANTON_VERSION=$CANTON_VERSION/" infra/.env

      - name: Start Canton network
        run: docker compose -f infra/compose.yaml --profile app-provider --profile app-user --profile sv up -d

      - name: Wait for validator readiness
        run: |
          ENDPOINTS=(
            "http://localhost:2903/api/validator/readyz"
            "http://localhost:3903/api/validator/readyz"
            "http://localhost:4903/api/validator/readyz"
          )
          MAX_WAIT=300
          INTERVAL=10
          ELAPSED=0

          echo "Waiting for ${#ENDPOINTS[@]} validator endpoints (timeout: ${MAX_WAIT}s)..."

          while true; do
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "::error::Timed out after ${MAX_WAIT}s waiting for validators"
              for ep in "${ENDPOINTS[@]}"; do
                curl -sf --max-time 5 "$ep" >/dev/null 2>&1 || echo "  NOT READY: $ep"
              done
              exit 1
            fi

            ALL_READY=true
            for ep in "${ENDPOINTS[@]}"; do
              if ! curl -sf --max-time 5 "$ep" >/dev/null 2>&1; then
                ALL_READY=false
                break
              fi
            done

            if [ "$ALL_READY" = true ]; then
              echo "All validators healthy after ${ELAPSED}s"
              break
            fi

            echo "  ... waiting (${ELAPSED}s elapsed)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: Run conformance harness
        run: |
          java -jar target/scala-2.13/canton-conformance-kit.jar \
            --scenario demo/scenarios/localnet-readiness.yaml \
            --output reports/ci \
            --retries 3 \
            --retry-delay 5 \
            --verbose

      - name: Upload conformance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-reports-${{ github.sha }}
          path: reports/ci/
          retention-days: 30

      - name: Generate conformance predicate
        if: success()
        run: |
          # Extract test results from the conformance report and format as
          # an in-toto test-result predicate (https://in-toto.io/attestation/test-result/v0.1)
          python3 - <<'PYEOF'
          import json, os

          with open("reports/ci/conformance-report.json") as f:
              report = json.load(f)["conformanceReport"]

          passed = []
          failed = []
          for inv in report.get("invariantResults", []):
              target = passed if inv["passed"] else failed
              target.append(inv["id"])

          predicate = {
              "result": "PASSED" if report["overallResult"] == "PASS" else "FAILED",
              "configuration": [{
                  "name": "localnet-readiness.yaml",
                  "digest": {"gitCommit": os.environ["GITHUB_SHA"]}
              }],
              "url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "passedTests": passed,
              "warnedTests": [],
              "failedTests": failed,
              "metadata": {
                  "cantonVersion": os.environ.get("CANTON_VERSION", "unknown"),
                  "scenarioName": report.get("scenario", {}).get("name", "unknown"),
                  "scenarioVersion": report.get("scenario", {}).get("version", "unknown"),
                  "toolVersion": report.get("toolVersion", "unknown"),
                  "timestamp": report.get("timestamp", "unknown")
              }
          }

          with open("conformance-predicate.json", "w") as f:
              json.dump(predicate, f, indent=2)

          print(f"Predicate: {report['overallResult']} — {len(passed)} passed, {len(failed)} failed")
          PYEOF

      - name: Attest conformance report
        if: success()
        uses: actions/attest@v4
        with:
          subject-path: reports/ci/conformance-report.json
          predicate-type: 'https://in-toto.io/attestation/test-result/v0.1'
          predicate-path: conformance-predicate.json

      - name: Attest conformance kit JAR
        if: success()
        uses: actions/attest@v4
        with:
          subject-path: target/scala-2.13/canton-conformance-kit.jar
          predicate-type: 'https://in-toto.io/attestation/test-result/v0.1'
          predicate-path: conformance-predicate.json

      - name: Capture Docker logs on failure
        if: failure()
        run: |
          mkdir -p reports
          docker compose -f infra/compose.yaml logs --no-color > reports/docker-logs.txt 2>&1 || true

      - name: Upload Docker logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs-${{ github.sha }}
          path: reports/docker-logs.txt

      - name: Teardown Canton network
        if: always()
        run: docker compose -f infra/compose.yaml --profile app-provider --profile app-user --profile sv down -v

      - name: Summary
        if: always()
        run: |
          echo "## Conformance Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Canton version:** \`$CANTON_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scenario:** \`localnet-readiness.yaml\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/ci/conformance-report.json ]; then
            RESULT=$(python3 -c "import json; r=json.load(open('reports/ci/conformance-report.json')); print(r['conformanceReport']['overallResult'])" 2>/dev/null || echo "UNKNOWN")
            echo "- **Result:** \`$RESULT\`" >> "$GITHUB_STEP_SUMMARY"
          fi
